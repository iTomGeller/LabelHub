server:
  port: ${LABELHUB_API_PORT:8080}

spring:
  application:
    name: labelhub-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/labelhub}
    username: ${SPRING_DATASOURCE_USERNAME:labelhub}
    password: ${SPRING_DATASOURCE_PASSWORD:labelhub}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: deepseek-chat
