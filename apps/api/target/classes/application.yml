spring:
  application:
    name: labelhub-api
  datasource:
    url: jdbc:mysql://localhost:3307/labelhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    baseline-on-migrate: true
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
